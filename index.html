<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大连海洋大学 · 知识星图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#030810;overflow-x:hidden;font-family:'Microsoft YaHei','PingFang SC',sans-serif;color:#fff;min-height:100vh}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.page{position:relative;z-index:1;min-height:100vh;display:none;animation:fadeUp .5s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ===== 首页 ===== */
.hero{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px 20px}
.hero-badge{display:inline-block;padding:6px 20px;border:1px solid rgba(110,168,254,.2);border-radius:20px;font-size:.75rem;color:rgba(255,255,255,.4);margin-bottom:24px;letter-spacing:2px;background:rgba(110,168,254,.04)}
.hero h1{font-size:3.2rem;font-weight:700;letter-spacing:10px;background:linear-gradient(135deg,#6ea8fe,#c084fc,#fb7185);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
.hero .sub{font-size:1.05rem;color:rgba(255,255,255,.35);margin-bottom:40px;letter-spacing:3px}
.hero-btn{padding:16px 64px;font-size:1.05rem;letter-spacing:5px;border:1.5px solid rgba(110,168,254,.3);background:rgba(110,168,254,.05);color:#8bb8ff;border-radius:50px;cursor:pointer;transition:all .3s;backdrop-filter:blur(6px)}
.hero-btn:hover{background:rgba(110,168,254,.15);border-color:rgba(110,168,254,.5);box-shadow:0 0 40px rgba(110,168,254,.2);color:#fff}

/* ===== 通用导航页 ===== */
.nav-page{padding:80px 40px 40px;max-width:1200px;margin:0 auto}
.nav-top{display:flex;align-items:center;gap:14px;margin-bottom:40px}
.nav-back{padding:8px 20px;background:rgba(110,168,254,.08);border:1px solid rgba(110,168,254,.2);color:#8bb8ff;border-radius:20px;cursor:pointer;font-size:.85rem;transition:all .3s}
.nav-back:hover{background:rgba(110,168,254,.18)}
.nav-title{font-size:1.6rem;background:linear-gradient(135deg,#6ea8fe,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-breadcrumb{font-size:.75rem;color:rgba(255,255,255,.3);margin-left:auto}
.nav-desc{font-size:.9rem;color:rgba(255,255,255,.35);margin-bottom:30px}

/* 学院卡片网格 */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
.card{background:rgba(10,16,40,.7);border:1px solid rgba(110,168,254,.1);border-radius:14px;padding:24px;cursor:pointer;transition:all .35s;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent,rgba(110,168,254,.4)),transparent);opacity:0;transition:opacity .3s}
.card:hover{border-color:rgba(110,168,254,.3);transform:translateY(-4px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.card:hover::before{opacity:1}
.card-icon{font-size:2rem;margin-bottom:12px}
.card-name{font-size:1.1rem;color:#e0e8ff;font-weight:600;margin-bottom:6px}
.card-count{font-size:.75rem;color:rgba(255,255,255,.3)}
.card-arrow{position:absolute;right:18px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.15);font-size:1.2rem;transition:all .3s}
.card:hover .card-arrow{color:rgba(255,255,255,.5);transform:translateY(-50%) translateX(4px)}

/* ===== 星图页 ===== */
.starmap-page{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:50}
.starmap-page.active{display:block}
.starmap-top{position:fixed;top:0;left:0;right:0;padding:16px 30px;display:flex;align-items:center;gap:14px;background:rgba(3,8,16,.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(110,168,254,.1);z-index:60}
.starmap-top h2{font-size:1.1rem;background:linear-gradient(135deg,#6ea8fe,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.starmap-bc{font-size:.7rem;color:rgba(255,255,255,.25);margin-left:auto}

.cLayer{position:absolute;top:0;left:0;width:100%;height:100%;transition:all .7s cubic-bezier(.25,.46,.45,.94)}
.cLayer.zoomed{opacity:0;pointer-events:none;transform:scale(1.8)}
.cLine{position:absolute;height:1.5px;transform-origin:left center;pointer-events:none;z-index:2}
.cStar{position:absolute;border-radius:50%;pointer-events:none;z-index:3}
.cStarGlow{position:absolute;border-radius:50%;pointer-events:none;z-index:2}
.cLabel{position:absolute;cursor:pointer;text-align:center;z-index:10;transition:all .3s}
.cLabel:hover{transform:scale(1.2)}
.cLabel:hover .cName{text-shadow:0 0 20px var(--gc)}
.cName{font-size:.82rem;color:rgba(255,255,255,.82);white-space:nowrap;letter-spacing:1.5px;transition:text-shadow .3s}
.cSub{font-size:.58rem;color:rgba(255,255,255,.28);margin-top:3px}

/* 右侧面板 */
.side-panel{position:fixed;top:0;right:0;width:420px;height:100vh;background:rgba(5,10,28,.93);backdrop-filter:blur(20px);border-left:1px solid rgba(110,168,254,.12);z-index:70;transform:translateX(100%);transition:transform .45s cubic-bezier(.25,.46,.45,.94);overflow-y:auto;padding:28px 24px}
.side-panel.open{transform:translateX(0)}
.side-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.03);color:rgba(255,255,255,.5);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
.side-close:hover{background:rgba(255,255,255,.1);color:#fff}
.side-head{text-align:center;padding:20px 0 24px;border-bottom:1px solid rgba(110,168,254,.1);margin-bottom:20px}
.side-head h3{font-size:1.4rem;background:linear-gradient(135deg,#6ea8fe,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.side-head .desc{font-size:.8rem;color:rgba(255,255,255,.35);margin-top:4px}
.grade-btns{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.grade-btn{padding:8px 18px;border-radius:20px;border:1px solid rgba(110,168,254,.18);background:rgba(110,168,254,.05);color:#8bb8ff;font-size:.85rem;cursor:pointer;transition:all .3s}
.grade-btn:hover,.grade-btn.active{background:rgba(110,168,254,.18);border-color:rgba(110,168,254,.45);color:#fff}
.unit-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px}
.unit-col{min-width:140px;flex:1;background:rgba(110,168,254,.03);border:1px solid rgba(110,168,254,.08);border-radius:10px;padding:12px;flex-shrink:0}
.unit-col-title{font-size:.75rem;color:#8bb8ff;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid rgba(110,168,254,.08);font-weight:600;letter-spacing:1px}
.unit-item{padding:6px 8px;margin-bottom:4px;border-radius:6px;font-size:.72rem;color:rgba(255,255,255,.6);cursor:pointer;transition:all .25s;line-height:1.4}
.unit-item:hover{background:rgba(110,168,254,.1);color:rgba(255,255,255,.9)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:65;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}

/* 脑图页 */
.mindmap-page{position:fixed;top:0;left:0;width:100%;height:100%;display:none;z-index:80;background:rgba(3,8,16,.96);overflow:auto}
.mindmap-page.show{display:block}
.mm-header{padding:20px 32px;display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(110,168,254,.08);background:rgba(5,10,28,.9);backdrop-filter:blur(12px);position:sticky;top:0;z-index:5}
.mm-back{padding:8px 20px;background:rgba(110,168,254,.08);border:1px solid rgba(110,168,254,.2);color:#8bb8ff;border-radius:20px;cursor:pointer;font-size:.85rem;transition:all .3s}
.mm-back:hover{background:rgba(110,168,254,.18)}
.mm-title{font-size:1.2rem;background:linear-gradient(135deg,#6ea8fe,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mm-bc{font-size:.7rem;color:rgba(255,255,255,.25);margin-left:auto}
.mm-body{padding:40px}
.mm-center{display:flex;flex-direction:column;align-items:center}
.mm-root{padding:16px 32px;background:linear-gradient(135deg,rgba(110,168,254,.12),rgba(192,132,252,.12));border:1.5px solid rgba(110,168,254,.25);border-radius:14px;font-size:1rem;font-weight:600;color:#c8d8ff;text-align:center;box-shadow:0 0 30px rgba(110,168,254,.12);letter-spacing:1px}
.mm-branches{display:flex;gap:24px;margin-top:30px;position:relative;justify-content:center;flex-wrap:wrap}
.mm-branches::before{content:'';position:absolute;top:-30px;left:50%;width:1px;height:30px;background:rgba(110,168,254,.15)}
.mm-node{position:relative;padding:14px 18px;background:rgba(110,168,254,.04);border:1px solid rgba(110,168,254,.1);border-radius:10px;min-width:150px;max-width:220px;text-align:center;transition:all .3s}
.mm-node::before{content:'';position:absolute;top:-14px;left:50%;width:1px;height:14px;background:rgba(110,168,254,.15)}
.mm-node:hover{background:rgba(110,168,254,.1);border-color:rgba(110,168,254,.3);transform:translateY(-3px)}
.mm-node-title{font-size:.85rem;color:#c8d8ff;margin-bottom:4px;font-weight:500}
.mm-node-sub{font-size:.7rem;color:rgba(255,255,255,.3)}
.mm-node-tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:.6rem;margin-top:6px}
.tag-note{background:rgba(100,180,255,.1);color:#8ab4ff;border:1px solid rgba(100,180,255,.15)}
.tag-video{background:rgba(255,100,100,.1);color:#ff6b6b;border:1px solid rgba(255,100,100,.15)}
.tag-ppt{background:rgba(255,180,100,.1);color:#ffb464;border:1px solid rgba(255,180,100,.15)}
.tag-doc{background:rgba(100,255,180,.1);color:#64ffb4;border:1px solid rgba(100,255,180,.15)}
.mm-sub{display:flex;flex-direction:column;gap:6px;margin-top:10px;padding-top:8px;border-top:1px solid rgba(110,168,254,.06)}
.mm-sub-item{padding:5px 10px;border-radius:6px;font-size:.7rem;color:rgba(255,255,255,.5);cursor:pointer;transition:all .2s;text-align:left}
.mm-sub-item:hover{background:rgba(110,168,254,.08);color:rgba(255,255,255,.85)}
.mm-sub-item.video-item{color:#ff6b6b}
.mm-sub-item.video-item:hover{background:rgba(255,100,100,.1)}
.mm-sub-item.ppt-item{color:#ffb464}
.mm-sub-item.ppt-item:hover{background:rgba(255,180,100,.1)}
.mm-sub-item.doc-item{color:#64ffb4}
.mm-sub-item.doc-item:hover{background:rgba(100,255,180,.1)}

/* 视频播放器 */
.video-player{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center}
.video-player.show{display:flex}
.video-container{position:relative;width:90%;max-width:1200px;background:#000;border-radius:12px;overflow:hidden;box-shadow:0 0 50px rgba(0,0,0,.5)}
.video-header{padding:16px 24px;background:rgba(20,20,30,.95);display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.1)}
.video-title{font-size:1.1rem;color:#fff;flex:1}
.video-close{padding:8px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .3s}
.video-close:hover{background:rgba(255,100,100,.3)}
.video-element{width:100%;aspect-ratio:16/9;background:#000}
.video-list{padding:16px 24px;background:rgba(20,20,30,.95);display:flex;gap:10px;overflow-x:auto;border-top:1px solid rgba(255,255,255,.1)}
.video-list-item{padding:8px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.7);font-size:.8rem;cursor:pointer;transition:all .3s;white-space:nowrap}
.video-list-item:hover,.video-list-item.active{background:rgba(255,100,100,.2);border-color:rgba(255,100,100,.4);color:#fff}

/* PPT查看器 */
.ppt-viewer{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center}
.ppt-viewer.show{display:flex}
.ppt-container{position:relative;width:90%;max-width:1200px;height:80vh;background:#1a1a2e;border-radius:12px;overflow:hidden;box-shadow:0 0 50px rgba(0,0,0,.5)}
.ppt-header{padding:16px 24px;background:rgba(20,20,30,.95);display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(255,255,255,.1)}
.ppt-title{font-size:1.1rem;color:#fff;flex:1}
.ppt-close{padding:8px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .3s}
.ppt-close:hover{background:rgba(255,180,100,.3)}
.ppt-content{width:100%;height:calc(100% - 60px);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:1.2rem}
.ppt-list{padding:16px 24px;background:rgba(20,20,30,.95);display:flex;gap:10px;overflow-x:auto;border-top:1px solid rgba(255,255,255,.1)}
.ppt-list-item{padding:8px 16px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.7);font-size:.8rem;cursor:pointer;transition:all .3s;white-space:nowrap}
.ppt-list-item:hover,.ppt-list-item.active{background:rgba(255,180,100,.2);border-color:rgba(255,180,100,.4);color:#fff}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(110,168,254,.12);border-radius:3px}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<!-- ===== 第0层：首页 ===== -->
<div class="page active" id="page0">
  <div class="hero">
    <div class="hero-badge">大连海洋大学 · DLU</div>
    <h1>知 识 星 图</h1>
    <p class="sub">探索每一个学院，点亮每一颗知识之星</p>
    <button class="hero-btn" onclick="goPage(1)">进 入 星 图</button>
  </div>
</div>

<!-- ===== 第1层：选择学院 ===== -->
<div class="page" id="page1">
  <div class="nav-page">
    <div class="nav-top">
      <button class="nav-back" onclick="goPage(0)">← 返回</button>
      <div class="nav-title">选择学院</div>
      <div class="nav-bc">首页 / 学院</div>
    </div>
    <div class="nav-desc">大连海洋大学共设有 12 个二级学院，选择你所在的学院</div>
    <div class="card-grid" id="collegeGrid"></div>
  </div>
</div>

<!-- ===== 第2层：选择专业 ===== -->
<div class="page" id="page2">
  <div class="nav-page">
    <div class="nav-top">
      <button class="nav-back" onclick="goPage(1)">← 返回</button>
      <div class="nav-title" id="majorTitle">选择专业</div>
      <div class="nav-bc" id="majorBC">首页 / 学院 / 专业</div>
    </div>
    <div class="nav-desc" id="majorDesc">选择你所在的专业</div>
    <div class="card-grid" id="majorGrid"></div>
  </div>
</div>

<!-- ===== 第3层：星图 ===== -->
<div class="starmap-page" id="page3">
  <div class="starmap-top">
    <button class="nav-back" onclick="backToMajors()">← 返回</button>
    <h2 id="starmapTitle">知识星图</h2>
    <div class="starmap-bc" id="starmapBC"></div>
  </div>
  <div class="cLayer" id="cLayer"></div>
</div>

<!-- 右侧面板 -->
<div class="overlay" id="overlay" onclick="closeSide()"></div>
<div class="side-panel" id="sidePanel">
  <button class="side-close" onclick="closeSide()">✕</button>
  <div id="sideContent"></div>
</div>

<!-- 脑图页 -->
<div class="mindmap-page" id="mindmapPage">
  <div class="mm-header">
    <button class="mm-back" onclick="closeMindmap()">← 返回星图</button>
    <div class="mm-title" id="mmTitle"></div>
    <div class="mm-bc" id="mmBC"></div>
  </div>
  <div class="mm-body" id="mmBody"></div>
</div>

<!-- 视频播放器 -->
<div class="video-player" id="videoPlayer">
  <div class="video-container">
    <div class="video-header">
      <div class="video-title" id="videoTitle">视频播放</div>
      <button class="video-close" onclick="closeVideo()">✕ 关闭</button>
    </div>
    <video class="video-element" id="videoElement" controls>
      <source id="videoSource" src="" type="video/mp4">
      您的浏览器不支持视频播放
    </video>
    <div class="video-list" id="videoList"></div>
  </div>
</div>

<!-- PPT查看器 -->
<div class="ppt-viewer" id="pptViewer">
  <div class="ppt-container">
    <div class="ppt-header">
      <div class="ppt-title" id="pptTitle">PPT查看</div>
      <button class="ppt-close" onclick="closePpt()">✕ 关闭</button>
    </div>
    <div class="ppt-content" id="pptContent">
      <div style="text-align:center">
        <div style="font-size:3rem;margin-bottom:20px">📄</div>
        <div>正在加载PPT文件...</div>
        <div style="font-size:.8rem;margin-top:10px;color:rgba(255,255,255,.3)">提示：PPT文件需要下载后使用Office/WPS打开</div>
      </div>
    </div>
    <div class="ppt-list" id="pptList"></div>
  </div>
</div>

<script>
// ===== 星空背景 =====
const cv=document.getElementById('bg'),cx=cv.getContext('2d');let bgS=[];
function rc(){cv.width=innerWidth;cv.height=innerHeight}
function ib(){bgS=[];for(let i=0;i<700;i++)bgS.push({x:Math.random()*cv.width,y:Math.random()*cv.height,r:Math.random()*1.6+.2,s:Math.random()*.01+.002,p:Math.random()*Math.PI*2,b:Math.random()>.93})}
function db(){cx.clearRect(0,0,cv.width,cv.height);const t=Date.now()*.001;bgS.forEach(s=>{const a=.12+.88*Math.abs(Math.sin(t*s.s*50+s.p));cx.beginPath();cx.arc(s.x,s.y,s.r,0,Math.PI*2);cx.fillStyle=s.b?`rgba(220,230,255,${a})`:`rgba(160,180,240,${a*.6})`;cx.fill();if(s.b&&a>.7){cx.beginPath();cx.arc(s.x,s.y,s.r*4,0,Math.PI*2);cx.fillStyle=`rgba(180,200,255,${a*.06})`;cx.fill()}});requestAnimationFrame(db)}
rc();ib();db();addEventListener('resize',()=>{rc();ib();if(document.getElementById('page3').classList.contains('active'))layoutC()});

// ===== 大连海洋大学学院数据 =====
const COLLEGES=[
  {id:1,name:'水产与生命学院',icon:'🐟',accent:'#4fc3f7',
   majors:[
    {id:'a1',name:'水产养殖学',subjects:['鱼类学','水族科学导论','水产动物疾病学','水化学','鱼类遗传育种学','水产动物营养与饲料学','养殖水化学']},
    {id:'a2',name:'水族科学与技术',subjects:['大学化学C','大学计算机基础','高等数学C','普通动物学','大学英语一','生物统计及应用','海洋动物学','有机化学','大学英语二']},
    {id:'a3',name:'海洋生物资源与环境',subjects:['海洋生态学','海洋生物学','环境监测','海洋资源学','海洋环境保护']},
    {id:'a4',name:'生物科学',subjects:['细胞生物学','分子生物学','微生物学','遗传学','生物化学']},
  ]},
  {id:2,name:'海洋与土木工程学院',icon:'🌊',accent:'#29b6f6',
   majors:[
    {id:'b1',name:'港口航道与海岸工程',subjects:['港口规划','航道工程','海岸动力学','水工建筑物']},
    {id:'b2',name:'海洋资源开发技术',subjects:['海洋资源概论','海洋工程','深海采矿技术']},
    {id:'b3',name:'土木工程',subjects:['结构力学','混凝土结构','建筑施工','工程造价']},
  ]},
  {id:3,name:'航海与船舶工程学院',icon:'⚓',accent:'#42a5f5',
   majors:[

// ===== 第3层：星图 =====
function layoutC(){
  const L=document.getElementById('cLayer');L.innerHTML='';
  if(!selMajor)return;
  const W=innerWidth,H=innerHeight;
  const subs=selMajor.subjects;
  const n=subs.length;

  // 根据科目数量布局星座
  const positions=getPositions(n,W,H);

  subs.forEach((sub,i)=>{
    const cst=CONSTELLATIONS[sub]||DEFAULT_CSTELL;
    const pos=positions[i];
    const bx=pos.x,by=pos.y;
    const sc=Math.min(W,H)*0.1;

    // 连线
    cst.lines.forEach(([a,b])=>{
      const s1=cst.stars[a],s2=cst.stars[b];
      if(!s1||!s2)return;
      const x1=bx+(s1.x-50)/100*sc,y1=by+(s1.y-50)/100*sc;
      const x2=bx+(s2.x-50)/100*sc,y2=by+(s2.y-50)/100*sc;
      const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy),ang=Math.atan2(dy,dx)*180/Math.PI;
      const glow=document.createElement('div');glow.className='cLine';
      glow.style.cssText=`left:${x1}px;top:${y1}px;width:${len}px;transform:rotate(${ang}deg);height:6px;background:linear-gradient(90deg,${cst.color}00,${cst.color}22,${cst.color}00);filter:blur(3px)`;
      L.appendChild(glow);
      const line=document.createElement('div');line.className='cLine';
      line.style.cssText=`left:${x1}px;top:${y1}px;width:${len}px;transform:rotate(${ang}deg);height:1.5px;background:linear-gradient(90deg,${cst.color}10,${cst.color}50,${cst.color}10)`;
      L.appendChild(line);
    });

    // 星星
    cst.stars.forEach((s,si)=>{
      const sx=bx+(s.x-50)/100*sc,sy=by+(s.y-50)/100*sc;
      const glow=document.createElement('div');glow.className='cStarGlow';
      glow.style.cssText=`left:${sx-14}px;top:${sy-14}px;width:28px;height:28px;background:radial-gradient(circle,${cst.color}35,${cst.color}0a,transparent);filter:blur(4px)`;
      L.appendChild(glow);
      const star=document.createElement('div');star.className='cStar';
      const r=si<2?5:3.5;
      star.style.cssText=`left:${sx-r}px;top:${sy-r}px;width:${r*2}px;height:${r*2}px;background:radial-gradient(circle at 35% 35%,#fff,${cst.color},${cst.color}88);box-shadow:0 0 ${r*2}px ${cst.color},0 0 ${r*5}px ${cst.color}55`;
      L.appendChild(star);
    });

    // 标签
    const label=document.createElement('div');label.className='cLabel';
    label.style.cssText=`left:${bx-55}px;top:${by+sc*0.55}px;width:110px;--gc:${cst.color}`;
    label.innerHTML=`<div class="cName">${sub}</div><div class="cSub">${(KNOWLEDGE[sub]||getDefaultKnowledge(sub)).length} 份资料</div>`;
    label.onclick=()=>openSide(sub);
    L.appendChild(label);
  });
}

function getPositions(n,W,H){
  const pts=[];
  const pad=80;
  if(n<=3){
    const cx=W/2,cy=H/2+30;
    const r=Math.min(W,H)*0.22;
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;pts.push({x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)})}
  }else if(n<=6){
    const cx=W/2,cy=H/2+30;
    const rx=Math.min(W*0.32,380),ry=Math.min(H*0.26,280);
    for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2-Math.PI/2;pts.push({x:cx+rx*Math.cos(a),y:cy+ry*Math.sin(a)})}
  }else{
    const cols=Math.ceil(n/2);
    const gapX=(W-pad*2)/cols,gapY=(H-120)/2;
    for(let i=0;i<n;i++){const row=Math.floor(i/cols),col=i%cols;const cx2=pad+gapX*(col+0.5);const cy2=120+gapY*(row+0.5);pts.push({x:cx2,y:cy2})}
  }
  return pts;
}

function openDoc(sub,docKey){
